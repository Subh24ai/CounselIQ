# Development override — adds bind mounts and hot-reload commands.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
name: counseliq

services:
  backend:
    build:
      target: runtime
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG

  worker:
    command:
      ["watchmedo", "auto-restart", "--directory=/app/app", "--pattern=*.py", "--recursive", "--",
       "celery", "-A", "app.tasks.celery_app:celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./backend/app:/app/app

  flower:
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      target: deps
    command: ["sh", "-c", "npm install && npm run dev"]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"

  # Local AWS emulator for S3 + Textract so document uploads work offline.
  localstack:
    image: localstack/localstack:3
    container_name: counseliq-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,textract
      DEFAULT_REGION: ap-south-1
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  localstack_data:
