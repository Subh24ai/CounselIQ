name: CI/CD

# CI runs on every push and on PRs to main. The deploy job is gated on both CI
# jobs passing AND the event being a push to main, so it never runs on PRs.
#
# This is a SINGLE workflow on purpose: the deploy job uses
# `needs: [backend-ci, frontend-ci]`, and GitHub Actions `needs` can only
# reference jobs in the same workflow. Splitting deploy into a second file would
# require the more fragile `on: workflow_run` pattern; keeping one workflow gives
# correct gating and a single status. Branch protection still references the
# `backend-ci` and `frontend-ci` job names as required checks.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref for PRs (saves minutes); never cancel a
# push to main mid-deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Backend: ruff lint, migrations against a real pgvector Postgres, pytest.
  # ===========================================================================
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: counseliq
          POSTGRES_PASSWORD: counseliq
          POSTGRES_DB: counseliq_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6380:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # sentence-transformers pulls torch (large). Cache pip aggressively, keyed
      # on the dependency manifest, so this job stays fast after the first run.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -e ".[dev]"

      - name: Run ruff
        run: cd backend && ruff check app/ tests/

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://counseliq:counseliq@localhost:5433/counseliq_test
        run: cd backend && alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://counseliq:counseliq@localhost:5433/counseliq_test
          REDIS_URL: redis://localhost:6380/0
          CELERY_BROKER_URL: redis://localhost:6380/0
          CELERY_RESULT_BACKEND: redis://localhost:6380/0
          JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars-long
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: "60"
          # The settings validator requires at least one LLM key at import time.
          # Tests mock the LLM, so a dummy key is sufficient; the real secret is
          # used when present (and absent on fork PRs, which is why we fall back).
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'ci-config-validation-dummy-key' }}
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-south-1
          S3_BUCKET_NAME: counseliq-test
          ENVIRONMENT: test
        run: cd backend && pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/.coverage
          if-no-files-found: ignore

  # ===========================================================================
  # Frontend: typecheck, lint, vitest, production build.
  # ===========================================================================
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Lint
        run: cd frontend && npm run lint

      - name: Run tests
        run: cd frontend && npm test

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
        run: cd frontend && npm run build

  # ===========================================================================
  # Deploy: build/push images to ECR, migrate, roll out ECS, verify. Only on a
  # push to main, only after both CI jobs pass.
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    env:
      AWS_REGION: ap-south-1
      ECS_CLUSTER: counseliq-production-cluster
      ECR_BACKEND_REPO: counseliq-backend
      ECR_FRONTEND_REPO: counseliq-frontend
      BACKEND_SVC: counseliq-production-backend
      WORKER_SVC: counseliq-production-worker
      FRONTEND_SVC: counseliq-production-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Fargate tasks run on ARM64 (Graviton) per the Terraform default, but the
      # runner is x86 — QEMU + buildx let us build arm64 images that will start
      # on Fargate. (A native ARM runner, `ubuntu-24.04-arm`, is a faster
      # alternative if available on your plan.)
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Set image tags
        id: tags
        run: |
          echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.tags.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:latest
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
          tags: |
            ${{ steps.tags.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:${{ steps.tags.outputs.sha }}
            ${{ steps.tags.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest
          cache-from: type=registry,ref=${{ steps.tags.outputs.registry }}/${{ env.ECR_FRONTEND_REPO }}:latest
          cache-to: type=inline

      # Register new task definitions (backend, worker, frontend) pointing at the
      # freshly pushed images, run migrations with the NEW backend image, then
      # roll all three services to the new definitions and wait for stability.
      - name: Migrate database and deploy to ECS
        run: |
          set -euo pipefail
          REGISTRY="${{ steps.tags.outputs.registry }}"
          SHA="${{ steps.tags.outputs.sha }}"
          BACKEND_IMAGE="$REGISTRY/${ECR_BACKEND_REPO}:$SHA"
          FRONTEND_IMAGE="$REGISTRY/${ECR_FRONTEND_REPO}:$SHA"

          # Register a new revision of <family> with <image>, echoing the new ARN.
          register() {
            local family="$1" image="$2"
            aws ecs describe-task-definition --task-definition "$family" \
              --query 'taskDefinition' --output json > "/tmp/td-$family.json"
            # shellcheck disable=SC2016  # $img is a jq variable (set via --arg), not a shell var
            jq --arg img "$image" '.containerDefinitions[0].image = $img | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' "/tmp/td-$family.json" > "/tmp/td-$family-new.json"
            aws ecs register-task-definition \
              --cli-input-json "file:///tmp/td-$family-new.json" \
              --query 'taskDefinition.taskDefinitionArn' --output text
          }

          BACKEND_TD="$(register "$BACKEND_SVC" "$BACKEND_IMAGE")"
          WORKER_TD="$(register "$WORKER_SVC" "$BACKEND_IMAGE")"   # worker shares the backend image
          FRONTEND_TD="$(register "$FRONTEND_SVC" "$FRONTEND_IMAGE")"
          echo "Registered task definitions:"
          echo "  backend:  $BACKEND_TD"
          echo "  worker:   $WORKER_TD"
          echo "  frontend: $FRONTEND_TD"

          # --- Migrations: one-off task on the NEW backend image ---------------
          # Reuse the backend service's network config (private subnets + SG).
          NETWORK="$(aws ecs describe-services --cluster "$ECS_CLUSTER" \
            --services "$BACKEND_SVC" \
            --query 'services[0].networkConfiguration' --output json)"

          TASK_ARN="$(aws ecs run-task --cluster "$ECS_CLUSTER" --launch-type FARGATE \
            --task-definition "$BACKEND_TD" --network-configuration "$NETWORK" \
            --overrides '{"containerOverrides":[{"name":"backend","command":["alembic","upgrade","head"]}]}' \
            --query 'tasks[0].taskArn' --output text)"
          [ -n "$TASK_ARN" ] && [ "$TASK_ARN" != "None" ] || { echo "Failed to start migration task"; exit 1; }
          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"
          EXIT="$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)"
          [ "$EXIT" = "0" ] || { echo "Migration failed (exit $EXIT) — check the backend CloudWatch logs"; exit 1; }
          echo "Migrations applied."

          # --- Roll out all three services to the new task definitions ---------
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$BACKEND_SVC" \
            --task-definition "$BACKEND_TD" --force-new-deployment >/dev/null
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$WORKER_SVC" \
            --task-definition "$WORKER_TD" --force-new-deployment >/dev/null
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$FRONTEND_SVC" \
            --task-definition "$FRONTEND_TD" --force-new-deployment >/dev/null
          echo "Rollout triggered; waiting for services to stabilise…"

          aws ecs wait services-stable --cluster "$ECS_CLUSTER" \
            --services "$BACKEND_SVC" "$WORKER_SVC" "$FRONTEND_SVC"
          echo "All services stable."

      - name: Health check
        run: |
          set -uo pipefail
          # Must be HTTPS: the ALB redirects 80->443, so a plaintext check would
          # only ever see the redirect, never the JSON health body.
          URL="https://${{ secrets.DOMAIN_NAME }}/health/detailed"
          for i in $(seq 1 10); do
            STATUS="$(curl -sf --max-time 10 "$URL" | jq -r '.status' 2>/dev/null || true)"
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed: $URL -> status=ok"
              exit 0
            fi
            echo "Attempt $i/10: status='${STATUS:-unreachable}', retrying in 15s…"
            sleep 15
          done
          echo "Health check failed after 10 attempts: $URL"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed for commit ${GITHUB_SHA}"
          echo "Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
