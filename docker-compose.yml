name: counseliq

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: counseliq-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-counseliq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-counseliq}
      POSTGRES_DB: ${POSTGRES_DB:-counseliq}
    # Host 5432 is commonly occupied; expose Postgres on 5433 on the host.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-counseliq} -d ${POSTGRES_DB:-counseliq}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: counseliq-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: counseliq-backend:latest
    container_name: counseliq-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: counseliq-backend:latest
    container_name: counseliq-worker
    restart: unless-stopped
    env_file: .env
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: counseliq-backend:latest
    container_name: counseliq-flower
    restart: unless-stopped
    env_file: .env
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "flower", "--port=5555"]
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: counseliq-frontend:latest
    container_name: counseliq-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
